behaviors:
  Pyramids:
    trainer_type: ppo
    hyperparameters:
      batch_size: 128
      buffer_size: 2048
      learning_rate: 0.0003
      beta: 0.01
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 512
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      curiosity:
        gamma: 0.99
        strength: 0.02
        network_settings:
          hidden_units: 256
        learning_rate: 0.0003
    keep_checkpoints: 5
    max_steps: 500000
    time_horizon: 128
    summary_freq: 10000

environment_parameters:
  task_difficulty:
    curriculum:
      - name: Lesson0_GoldOnly
        completion_criteria:
          measure: reward
          behavior: Pyramids
          signal_smoothing: true
          min_lesson_length: 100
          threshold: -0.5
        value: 2.0
      - name: Lesson1_ButtonNearAgent
        completion_criteria:
          measure: reward
          behavior: Pyramids
          signal_smoothing: true
          min_lesson_length: 100
          threshold: -0.5
        value: 1.0
      - name: Lesson2_Full
        value: 0.0
