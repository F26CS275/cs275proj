behaviors:
  ButtonPresser:
    trainer_type: poca
    hyperparameters:
      batch_size: 256
      buffer_size: 4096
      learning_rate: 2.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.9
      num_epoch: 3
      learning_rate_schedule: constant
    network_settings:
      normalize: false
      hidden_units: 512
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      curiosity:
        strength: 0.01
        gamma: 0.99
        learning_rate: 2.0e-4
        network_settings:
          hidden_units: 256
          num_layers: 2
          vis_encode_type: simple
    keep_checkpoints: 10
    checkpoint_interval: 100000
    max_steps: 2000000
    time_horizon: 128
    summary_freq: 30000

  GoldCollector:
